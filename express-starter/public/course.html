<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Detail &mdash; Husky Hero</title>
  <link rel="stylesheet" href="stylesheets/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">
      <img src="images/husky-icon.svg" alt="" class="nav-logo" />
      Husky Hero
    </a>
    <a href="index.html" class="nav-link">Courses</a>
    <a href="course.html" class="nav-link">Course Detail</a>
  </nav>

  <main class="wide">

    <a href="index.html" class="back-link">&larr; Back to all courses</a>

    <div class="course-layout">

      <!-- Primary column: header + tabbed panels -->
      <div class="course-main">

        <!-- Course header — filled in by JS -->
        <div id="courseHeader">
          <p>Loading course&hellip;</p>
        </div>

        <!-- Tab bar with quick-action link -->
        <div class="tab-bar">
          <button class="tab-btn active" id="tab-reviews" onclick="showTab('reviews')">
            Reviews <span class="tab-badge" id="badgeReviews"></span>
          </button>
          <button class="tab-btn" id="tab-threads" onclick="showTab('threads')">
            Threads <span class="tab-badge" id="badgeThreads"></span>
          </button>
          <a href="#" id="linkAddReview"    class="tab-action-link" onclick="expandBottomForm('reviewsPanel');  return false;">+ Add a Review</a>
          <a href="#" id="linkStartThread"  class="tab-action-link" style="display:none" onclick="expandBottomForm('threadsPanel'); return false;">+ Start a Thread</a>
        </div>

        <!-- ── Reviews panel ─────────────────────────────────────────── -->
        <div class="panel-container" id="reviewsPanel">

          <div class="panel-topbar">
            <p id="reviewStatus" class="panel-status"></p>
          </div>

          <div class="panel-scroll">
            <div id="reviewsList"></div>
          </div>

          <div class="panel-bottom-form">
            <div class="form-toggle-bar" onclick="toggleBottomForm('reviewsPanel')">
              <span>Add a Review</span>
              <span class="form-toggle-chevron">&#9660;</span>
            </div>
            <div class="form-toggle-body" id="reviewFormBody">
              <form id="reviewForm" onsubmit="submitReview(event)">
                <p>
                  <label for="rfUsername">Name (optional)</label>
                  <input type="text" id="rfUsername" placeholder="Anonymous" />
                </p>
                <p>
                  <label for="rfOverall">Overall Rating (1&ndash;5)</label>
                  <input type="number" id="rfOverall" min="1" max="5" required />
                </p>
                <p>
                  <label for="rfDifficulty">Difficulty (1&ndash;5)</label>
                  <input type="number" id="rfDifficulty" min="1" max="5" required />
                </p>
                <p>
                  <label for="rfWorkload">Workload (1&ndash;5)</label>
                  <input type="number" id="rfWorkload" min="1" max="5" required />
                </p>
                <p>
                  <label for="rfText">Review</label>
                  <textarea id="rfText" rows="4" required></textarea>
                </p>
                <p>
                  <button type="submit">Submit Review</button>
                </p>
                <p id="reviewFormStatus"></p>
              </form>
            </div>
          </div>

        </div><!-- /#reviewsPanel -->

        <!-- ── Threads panel ──────────────────────────────────────────── -->
        <div class="panel-container" id="threadsPanel" style="display:none">

          <div class="panel-topbar">
            <p id="threadStatus" class="panel-status"></p>
          </div>

          <div class="panel-scroll">
            <div id="threadsList"></div>
          </div>

          <div class="panel-bottom-form">
            <div class="form-toggle-bar" onclick="toggleBottomForm('threadsPanel')">
              <span>Start a Thread</span>
              <span class="form-toggle-chevron">&#9660;</span>
            </div>
            <div class="form-toggle-body" id="threadFormBody">
              <form id="threadForm" onsubmit="submitThread(event)">
                <p>
                  <label for="tfUsername">Name (optional)</label>
                  <input type="text" id="tfUsername" placeholder="Anonymous" />
                </p>
                <p>
                  <label for="tfTitle">Thread Title</label>
                  <input type="text" id="tfTitle" required placeholder="What&rsquo;s on your mind?" />
                </p>
                <p>
                  <label for="tfBody">Description</label>
                  <textarea id="tfBody" rows="3" required placeholder="Add more detail&hellip;"></textarea>
                </p>
                <p>
                  <button type="submit">Post Thread</button>
                </p>
                <p id="threadFormStatus"></p>
              </form>
            </div>
          </div>

        </div><!-- /#threadsPanel -->

      </div><!-- /.course-main -->

      <!-- Right column: quick stats — shown by JS -->
      <aside id="courseSidebar" style="display:none">
        <h2>Quick Stats</h2>
        <ul>
          <li><strong>Department</strong> <span id="sdDept"></span></li>
          <li><strong>Number</strong>     <span id="sdNumber"></span></li>
          <li><strong>Credits</strong>    <span id="sdCredits"></span></li>
          <li><strong>Avg Difficulty</strong> <span id="sdDifficulty"></span></li>
          <li><strong>Avg Workload</strong>   <span id="sdWorkload"></span></li>
          <li><strong>Avg Overall</strong>    <span id="sdOverall"></span></li>
        </ul>
      </aside>

    </div><!-- /.course-layout -->

  </main>

  <footer>
    <p>Husky Hero &mdash; Built by UW Students</p>
  </footer>

  <script src="javascripts/course.js"></script>
</body>
</html>
