<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Husky Hero</title>
  <link rel="stylesheet" href="stylesheets/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">
      <img src="images/husky_hero_icon.png" alt="" class="nav-logo" />
      Husky Hero
    </a>
    <a href="index.html" class="nav-link">Courses</a>
    <a href="about.html" class="nav-link">About</a>
  </nav>

  <header class="hero">
    <div class="hero-brand">
      <!-- Drop images/husky_hero_logo.png (full icon + wordmark) to replace this placeholder -->
      <img src="images/husky_hero_logo.png" alt="Husky Hero"
           class="hero-logo"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'" />
      <div class="hero-logo-fallback" style="display:none">
        <img src="images/husky_hero_icon.png" alt="" class="hero-logo-icon"
             onerror="this.style.display='none'" />
        <span class="hero-wordmark">Husky Hero</span>
      </div>
    </div>
    <p class="hero-slogan">Build your perfect schedule.</p>
    <p class="hero-desc">
      Real reviews from real UW students &mdash; explore courses, weigh the workload,
      and find classes that fit your goals before you ever click &ldquo;Register.&rdquo;
    </p>
    <div class="search-wrap">
      <label for="searchInput" class="sr-only">Search courses</label>
      <input
        type="text"
        id="searchInput"
        placeholder="Search by course name, department, or number&hellip;"
        oninput="filterCourses()"
      />
    </div>
  </header>

  <main>

    <div class="dept-filter">
      <span class="dept-filter-label">Department</span>
      <button onclick="setDept(this, 'all')" class="active">All</button>
      <button onclick="setDept(this, 'CSE')">CSE</button>
      <button onclick="setDept(this, 'MATH')">MATH</button>
      <button onclick="setDept(this, 'ENGL')">ENGL</button>
      <button onclick="setDept(this, 'STAT')">STAT</button>
      <button onclick="setDept(this, 'INFO')">INFO</button>
      <button onclick="setDept(this, 'PHYS')">PHYS</button>
    </div>

    <p id="statusMsg">Loading courses&hellip;</p>

    <div id="courseGrid"></div>

  </main>

  <footer>
    <p>Husky Hero &mdash; Built by UW Students</p>
  </footer>

  <script src="javascripts/index.js"></script>
</body>
</html>
